services:
  db:
    image: mysql:8.0
    container_name: intercom_mysql
    restart: always
    ports:
      - '3310:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=1000
      - --innodb_buffer_pool_size=1G
    networks:
      - intercom_network
    healthcheck:
      test:
        ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${MYSQL_ROOT_PASSWORD}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.0-alpine
    container_name: intercom_redis
    restart: always
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - intercom_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frpc:
    image: fatedier/frpc:latest
    container_name: intercom_frpc
    restart: always
    volumes:
      - ./frp/frpc.toml:/etc/frp/frpc.toml
    networks:
      - intercom_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  intercom_network:
    driver: bridge

volumes:
  mysql_data:
    name: intercom_mysql_data
  redis_data:
    name: intercom_redis_data
  mqtt_log:
    name: intercom_mqtt_log
